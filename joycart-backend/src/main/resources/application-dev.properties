# 开发环境配置 - 本地PostgreSQL数据库
spring.datasource.url=jdbc:postgresql://localhost:5432/joycart
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
server.port=8083
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=mySecretKeyForJoyCartApplicationThatIsLongEnoughForHS256AndShouldBeChangedInProduction
# Jwt Expiration Time in milliseconds (24 hours)
jwt.expiration=86400000

# Security Configuration
security.cors.allowed-origins=http://localhost:3000
security.public-endpoints=/users/register,/users/login,/search/**,/nearby/**,/product/**,/home,/category/**

# 配送时间配置
delivery.time.start-hour=9
delivery.time.end-hour=18
delivery.time.slot-minutes=30
delivery.time.available-days=3
delivery.time.excluded-dates=2025-12-25,2026-01-01
