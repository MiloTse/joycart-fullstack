# 开发环境配置 - 本地PostgreSQL数据库
spring.datasource.url=jdbc:postgresql://localhost:5432/joycart
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=8083
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=mySecretKeyForJoyCartApplicationThatIsLongEnoughForHS256AndShouldBeChangedInProduction
# Jwt Expiration Time in milliseconds (24 hours)
jwt.expiration=86400000

# Security Configuration
security.cors.allowed-origins=http://localhost:3000
security.public-endpoints=/users/register,/users/login,/search/**,/nearby/**,/product/**,/home,/category/**
